<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krisha AI Assistant</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #f0f2f5; 
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        .mic-btn { 
            height: 100px; width: 100px; 
            background: linear-gradient(145deg, #4caf50, #45a049);
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; border: none; 
            box-shadow: 0px 5px 15px rgba(76, 175, 80, 0.4);
            transition: 0.3s; margin: 20px auto; 
        }
        .mic-btn:active { transform: scale(0.9); }
        .mic-btn.listening { background: #e74c3c; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(231, 76, 60, 0); }
            100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
        }

        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 10px; }
        #output { 
            font-size: 18px; 
            color: #2980b9; 
            min-height: 50px;
            margin-top: 20px;
            padding: 10px;
            border-top: 1px solid #eee;
        }
        .status-text { color: #7f8c8d; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Krisha AI</h1>
        <p class="status-text">કાનજી સર, હું તમારી સેવામાં હાજર છું.</p>
        
        <button id="micBtn" class="mic-btn" onclick="startListening()">
            <span style="font-size: 40px; color: white;">🎤</span>
        </button>
        
        <div id="output">બટન દબાવીને વાત શરૂ કરો...</div>
    </div>

    <script>
        const output = document.getElementById('output');
        const micBtn = document.getElementById('micBtn');

        // અવાજ એટલે કે Krisha ની જીભ
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'gu-IN'; // ગુજરાતી ભાષા
            
            // અવાજને વધુ નેચરલ બનાવવા માટે
            const voices = window.speechSynthesis.getVoices();
            // ગૂગલના સારા અવાજો પસંદ કરવાનો પ્રયત્ન
            utterance.voice = voices.find(v => v.lang === 'gu-IN') || voices.find(v => v.lang === 'hi-IN') || voices[0];
            
            utterance.pitch = 1.0; 
            utterance.rate = 1.0; 
            
            window.speechSynthesis.speak(utterance);
        }

        // સાંભળવાની શક્તિ એટલે કે Krisha ના કાન
        function startListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("તમારા બ્રાઉઝરમાં વોઈસ સિસ્ટમ સપોર્ટ કરતી નથી.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'gu-IN'; // ગુજરાતીમાં સાંભળશે

            recognition.onstart = () => {
                micBtn.classList.add('listening');
                output.innerText = "જી સર, બોલો હું સાંભળું છું...";
            };

            recognition.onresult = (event) => {
                micBtn.classList.remove('listening');
                const transcript = event.results[0][0].transcript;
                output.innerText = "તમે કહ્યું: " + transcript;
                
                // Krisha નો જવાબ
                let response = "";
                if(transcript.includes("કેમ છો")) {
                    response = "હું મજામાં છું કાનજી સર, તમે કેમ છો?";
                } else {
                    response = "જી કાનજી સર, તમે કહ્યું " + transcript + ". હું આના પર કામ કરી રહી છું.";
                }
                
                speak(response);
            };

            recognition.onerror = () => {
                micBtn.classList.remove('listening');
                output.innerText = "ફરીથી બોલો, હું સમજી ન શકી.";
            };

            recognition.onend = () => {
                micBtn.classList.remove('listening');
            };

            recognition.start();
        }

        // અવાજો લોડ થાય તેની ખાતરી કરવી
        window.speechSynthesis.onvoiceschanged = () => {
            window.speechSynthesis.getVoices();
        };
    </script>
</body>
</html>
