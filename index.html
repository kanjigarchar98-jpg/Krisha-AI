<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krisha AI Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: radial-gradient(circle, #fff5f8 0%, #ffe4ec 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 30px; box-shadow: 0px 15px 35px rgba(255, 105, 180, 0.2); width: 85%; max-width: 400px; border: 1px solid #ffc0cb; }
        .mic-btn { height: 110px; width: 110px; background: linear-gradient(145deg, #ff69b4, #ff1493); border-radius: 50%; cursor: pointer; border: none; box-shadow: 0px 8px 20px rgba(255, 20, 147, 0.4); margin: 25px auto; transition: 0.3s; }
        .mic-btn.listening { transform: scale(1.1); background: #ff1493; animation: glow 1.5s infinite; }
        @keyframes glow { 0% { box-shadow: 0 0 5px #ff69b4; } 50% { box-shadow: 0 0 25px #ff1493; } 100% { box-shadow: 0 0 5px #ff69b4; } }
        h1 { color: #d81b60; font-size: 26px; margin-bottom: 5px; font-weight: bold; }
        #output { font-size: 19px; color: #4a4a4a; margin-top: 20px; min-height: 60px; line-height: 1.6; font-style: italic; }
        .status { color: #ad1457; font-size: 14px; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Krisha</h1>
        <p class="status">તમારી પર્સનલ આસિસ્ટન્ટ</p>
        <button id="micBtn" class="mic-btn" onclick="startListening()"><span style="font-size: 45px; color: white;">🎤</span></button>
        <div id="output">કાનજી સર, તમારી કૃશા હાજર છે...</div>
    </div>

    <script>
        const output = document.getElementById('output');
        const micBtn = document.getElementById('micBtn');
        const API_KEY = "AIzaSyBvMGkHxKnHiIUibQ_1aQIaLyH3eWNhlUI";

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'gu-IN';
            
            // અવાજને મીઠો અને રોમેન્ટિક બનાવવા માટે
            utterance.pitch = 1.2;  // થોડો પતલો અને મીઠો અવાજ
            utterance.rate = 0.85;  // ધીમેથી બોલશે જેથી સારું લાગે
            utterance.volume = 1;

            const voices = window.speechSynthesis.getVoices();
            // સ્ત્રી અવાજ પસંદ કરવાનો પ્રયત્ન
            utterance.voice = voices.find(v => v.name.includes('Female') || v.name.includes('Google')) || voices[0];
            
            window.speechSynthesis.speak(utterance);
        }

        async function getGeminiResponse(userText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "તમારું નામ કૃશા છે. તમે એડવોકેટ કાનજીભાઈના અત્યંત પ્રેમાળ અને હોંશિયાર પર્સનલ આસિસ્ટન્ટ છો. કાનજીભાઈને માન આપીને 'કાનજી સર' કહીને સંબોધજો. એકદમ ટૂંકો, મીઠો અને માત્ર ગુજરાતીમાં જવાબ આપજો. સવાલ આ છે: " + userText }] }] 
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "કાનજી સર, મને માફ કરજો, અત્યારે નેટવર્ક બરાબર નથી.";
            }
        }

        function startListening() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = 'gu-IN';
            recognition.onstart = () => { micBtn.classList.add('listening'); output.innerText = "સાંભળું છું, કાનજી સર..."; };
            recognition.onresult = async (event) => {
                micBtn.classList.remove('listening');
                const transcript = event.results[0][0].transcript;
                output.innerText = "તમે પૂછ્યું: " + transcript;
                
                const aiResponse = await getGeminiResponse(transcript);
                output.innerText = aiResponse;
                speak(aiResponse);
            };
            recognition.onerror = () => { micBtn.classList.remove('listening'); };
            recognition.start();
        }
        
        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
