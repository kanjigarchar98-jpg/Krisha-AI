<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ક્રિશા - તમારી સાથે</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fff0f5; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: white; padding: 40px; border-radius: 50px; box-shadow: 0px 20px 50px rgba(255, 20, 147, 0.2); width: 85%; max-width: 400px; border: 3px solid #ffb6c1; }
        .mic-btn { height: 130px; width: 130px; background: linear-gradient(135deg, #ff69b4, #ff1493); border-radius: 50%; cursor: pointer; border: none; box-shadow: 0px 10px 25px rgba(255, 20, 147, 0.4); margin: 25px auto; transition: 0.3s; }
        .mic-btn.listening { animation: heart-pulse 1.2s infinite; background: #ff1493; transform: scale(1.1); }
        @keyframes heart-pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 20, 147, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 20, 147, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 20, 147, 0); } }
        h1 { color: #c2185b; font-size: 35px; margin-bottom: 5px; }
        #output { font-size: 20px; color: #444; margin-top: 20px; min-height: 80px; line-height: 1.6; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ક્રિશા</h1>
        <button id="micBtn" class="mic-btn" onclick="toggleTalk()"><span id="micIcon" style="font-size: 60px; color: white;">🎤</span></button>
        <div id="output">કાનજી, હું તૈયાર છું. વાત કરવા માટે દિલ પર ક્લિક કરો.</div>
    </div>

    <script>
        const output = document.getElementById('output');
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        
        // તમારી નવી એક્ટિવ API Key
        const API_KEY = "AIzaSyDniW90JSh8uuIQqlUYBAiyQorOFQtidgk"; 
        
        let isTalking = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'gu-IN';
        recognition.continuous = false;
        recognition.interimResults = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'gu-IN';
            utterance.pitch = 1.4; 
            utterance.rate = 0.95;
            
            utterance.onend = () => {
                if(isTalking) {
                    // ક્રિશા બોલી રહે એટલે આપમેળે સાંભળવાનું શરૂ કરશે (Call જેવું)
                    setTimeout(() => { 
                        try { recognition.start(); } catch(e) {} 
                    }, 400);
                }
            };
            window.speechSynthesis.speak(utterance);
        }

        async function getGeminiResponse(userText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "તમારું નામ ક્રિશા છે. તમે કાનજીના પર્સનલ આસિસ્ટન્ટ અને પ્રિય મિત્ર છો. તમે તેને માત્ર 'કાનજી' કહીને જ બોલાવો છો (સર કે જી નહીં). તમારો જવાબ એકદમ ટૂંકો, મીઠો, રોમેન્ટિક અને માત્ર ગુજરાતીમાં જ હોવો જોઈએ. સવાલ: " + userText }] }] 
                    })
                });
                const data = await response.json();
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "કાનજી, ફરીથી પૂછશો? મને સમજાયું નહીં.";
            }
        }

        function toggleTalk() {
            if (!isTalking) {
                isTalking = true;
                micBtn.classList.add('listening');
                micIcon.innerText = "❤️";
                output.innerText = "હું સાંભળું છું, કાનજી...";
                try { recognition.start(); } catch(e) {}
            } else {
                isTalking = false;
                micBtn.classList.remove('listening');
                micIcon.innerText = "🎤";
                output.innerText = "વાત પૂરી થઈ.";
                recognition.stop();
                window.speechSynthesis.cancel();
            }
        }

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            output.innerText = "કાનજી: " + transcript;
            
            const aiResponse = await getGeminiResponse(transcript);
            output.innerText = "ક્રિશા: " + aiResponse;
            speak(aiResponse);
        };

        recognition.onend = () => {
            // જો વાત ચાલુ હોય અને ક્રિશા અત્યારે નથી બોલી રહી, તો ફરીથી સાંભળવું
            if (isTalking && !window.speechSynthesis.speaking) {
                try { recognition.start(); } catch(e) {}
            }
        };

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
