<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fff5f8; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: white; padding: 40px; border-radius: 50px; box-shadow: 0px 20px 50px rgba(255, 20, 147, 0.15); width: 85%; max-width: 400px; border: 2px solid #ffc0cb; }
        .mic-btn { height: 120px; width: 120px; background: linear-gradient(135deg, #ff85a2, #ff4d6d); border-radius: 50%; cursor: pointer; border: none; box-shadow: 0px 10px 25px rgba(255, 77, 109, 0.3); margin: 25px auto; transition: 0.4s; }
        .mic-btn.listening { transform: scale(1.1); background: #ff4d6d; animation: pulse-red 1.2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 77, 109, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); } }
        h1 { color: #c2185b; font-size: 28px; margin-bottom: 10px; font-weight: 300; }
        #output { font-size: 19px; color: #444; margin-top: 20px; min-height: 80px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>તમારી સાથે વાત કરવા તૈયાર...</h1>
        <button id="micBtn" class="mic-btn" onclick="toggleTalk()"><span id="micIcon" style="font-size: 55px; color: white;">🎤</span></button>
        <div id="output">કાનજી, હું તમારી રાહ જોઉં છું.</div>
    </div>

    <script>
        const output = document.getElementById('output');
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        
        // તમારી નવી API Key
        const API_KEY = "AIzaSyDniW90JSh8uuIQqlUYBAiyQorOFQtidgk"; 
        
        let isTalking = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'gu-IN';
        recognition.continuous = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'gu-IN';
            
            // અવાજને 25-35 વર્ષની સ્ત્રી જેવો બનાવવા માટે સેટિંગ્સ
            utterance.pitch = 1.05; // એકદમ નેચરલ પિચ
            utterance.rate = 0.95; // થોડું શાંતિથી અને પ્રોપરલી બોલશે
            
            const voices = window.speechSynthesis.getVoices();
            // ગુજરાતી કે હિન્દી સ્ત્રી અવાજ પસંદ કરવો
            utterance.voice = voices.find(v => v.lang === 'gu-IN' || v.lang === 'hi-IN') || voices[0];
            
            utterance.onend = () => {
                if(isTalking) {
                    setTimeout(() => { try { recognition.start(); } catch(e) {} }, 500);
                }
            };
            window.speechSynthesis.speak(utterance);
        }

        async function getGeminiResponse(userText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "તમે કાનજી નામના વ્યક્તિના પર્સનલ આસિસ્ટન્ટ છો. તમે તેને માત્ર 'કાનજી' કહીને જ બોલાવો છો. તમારો અવાજ અને જવાબ એક 30 વર્ષની મેચ્યોર અને પ્રેમથી વાત કરતી સ્ત્રી જેવો હોવો જોઈએ. કોઈ નામ વાપરવું નહીં. જવાબ ટૂંકો અને માત્ર ગુજરાતીમાં આપવો. સવાલ: " + userText }] }] 
                    })
                });
                const data = await response.json();
                if (data.error) return "કાનજી, લાગે છે કે ચાવીમાં હજુ પણ કંઈક ભૂલ છે. એકવાર ચેક કરશો?";
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "કાનજી, અત્યારે વાત નથી થઈ શકે તેમ.";
            }
        }

        function toggleTalk() {
            if (!isTalking) {
                isTalking = true;
                micBtn.classList.add('listening');
                micIcon.innerText = "❤️";
                try { recognition.start(); } catch(e) {}
            } else {
                isTalking = false;
                micBtn.classList.remove('listening');
                micIcon.innerText = "🎤";
                recognition.stop();
                window.speechSynthesis.cancel();
            }
        }

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            output.innerText = "તમે: " + transcript;
            const aiResponse = await getGeminiResponse(transcript);
            output.innerText = "જવાબ: " + aiResponse;
            speak(aiResponse);
        };

        recognition.onend = () => {
            if (isTalking && !window.speechSynthesis.speaking) {
                try { recognition.start(); } catch(e) {}
            }
        };

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
