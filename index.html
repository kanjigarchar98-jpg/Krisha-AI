<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Assistant</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fff5f8; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { background: white; padding: 40px; border-radius: 50px; box-shadow: 0px 20px 50px rgba(255, 20, 147, 0.15); width: 85%; max-width: 400px; border: 2px solid #ffc0cb; }
        .mic-btn { height: 120px; width: 120px; background: linear-gradient(135deg, #ff85a2, #ff4d6d); border-radius: 50%; cursor: pointer; border: none; box-shadow: 0px 10px 25px rgba(255, 77, 109, 0.3); margin: 25px auto; transition: 0.4s; }
        .mic-btn.listening { transform: scale(1.1); background: #ff4d6d; animation: pulse-red 1.2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(255, 77, 109, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 109, 0); } }
        #output { font-size: 19px; color: #444; margin-top: 20px; min-height: 80px; line-height: 1.6; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="headerMsg">હું સાંભળવા તૈયાર છું...</h1>
        <button id="micBtn" class="mic-btn" onclick="toggleTalk()"><span id="micIcon" style="font-size: 55px; color: white;">🎤</span></button>
        <div id="output">કાનજી, માઈક પર ક્લિક કરો એટલે આપણે વાત કરી શકીએ.</div>
    </div>

    <script>
        const output = document.getElementById('output');
        const micBtn = document.getElementById('micBtn');
        const micIcon = document.getElementById('micIcon');
        const headerMsg = document.getElementById('headerMsg');
        
        // તમારી નવી એક્ટિવ API Key
        const API_KEY = "AIzaSyDniW90JSh8uuIQqlUYBAiyQorOFQtidgk"; 
        
        let isTalking = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.lang = 'gu-IN';
        recognition.continuous = false;

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            
            // જો ગુજરાતી સ્ત્રી અવાજ ન મળે, તો હિન્દી સ્ત્રી અવાજ વાપરવો (જે વધુ મીઠો હોય છે)
            const voices = window.speechSynthesis.getVoices();
            let selectedVoice = voices.find(v => v.lang === 'gu-IN' && v.name.includes('Female'));
            if (!selectedVoice) {
                selectedVoice = voices.find(v => v.lang.includes('hi') && (v.name.includes('Female') || v.name.includes('Google')));
            }
            
            utterance.voice = selectedVoice || voices[0];
            utterance.lang = 'gu-IN'; // ભાષા ગુજરાતી જ રહેશે
            utterance.pitch = 1.3; // અવાજ પતલો અને યુવાન કરવા માટે
            utterance.rate = 0.9;
            
            utterance.onend = () => {
                if(isTalking) {
                    setTimeout(() => { try { recognition.start(); } catch(e) {} }, 600);
                }
            };
            window.speechSynthesis.speak(utterance);
        }

        async function getGeminiResponse(userText) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: "તમે કાનજીના પર્સનલ આસિસ્ટન્ટ છો. તમે તેને માત્ર 'કાનજી' કહીને જ બોલાવો છો. તમારો અવાજ અને સ્ટાઈલ એક ૨૮ વર્ષની અત્યંત બુદ્ધિશાળી અને પ્રેમાળ સ્ત્રી જેવી હોવી જોઈએ. તમારું કોઈ નામ નથી. જવાબ એકદમ ટૂંકો, શુદ્ધ ગુજરાતીમાં અને રોમેન્ટિક શૈલીમાં આપો. સવાલ: " + userText }] }] 
                    })
                });
                const data = await response.json();
                if (data.error) return "કાનજી, મને લાગે છે કે નેટવર્કમાં કોઈ સમસ્યા છે.";
                return data.candidates[0].content.parts[0].text;
            } catch (error) {
                return "કાનજી, અત્યારે કનેક્શન નથી થઈ રહ્યું.";
            }
        }

        function toggleTalk() {
            if (!isTalking) {
                isTalking = true;
                micBtn.classList.add('listening');
                micIcon.innerText = "❤️";
                headerMsg.innerText = "હું સાંભળું છું...";
                try { recognition.start(); } catch(e) {}
            } else {
                isTalking = false;
                micBtn.classList.remove('listening');
                micIcon.innerText = "🎤";
                headerMsg.innerText = "વાત બંધ થઈ ગઈ છે.";
                recognition.stop();
                window.speechSynthesis.cancel();
            }
        }

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            output.innerText = "કાનજી: " + transcript;
            const aiResponse = await getGeminiResponse(transcript);
            output.innerText = aiResponse;
            speak(aiResponse);
        };

        recognition.onend = () => {
            if (isTalking && !window.speechSynthesis.speaking) {
                try { recognition.start(); } catch(e) {}
            }
        };

        window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
    </script>
</body>
</html>
